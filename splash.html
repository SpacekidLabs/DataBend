<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DATABEND</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        -webkit-user-select: none;
        user-select: none;
      }

      .splash {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        opacity: 0;
        animation: fadeIn 0.6s ease forwards;
      }

      .splash.fade-out {
        animation: fadeOut 0.5s ease forwards;
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @keyframes fadeOut {
        to { opacity: 0; }
      }

      /* Logo image */
      .logo-img {
        width: 320px;
        height: 320px;
        object-fit: contain;
        opacity: 0;
        transform: scale(0.92);
        animation: logoIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
      }

      @keyframes logoIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Loading bar */
      .loader-wrap {
        margin-top: 48px;
        width: 220px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        opacity: 0;
        animation: fadeIn 0.5s ease 0.9s forwards;
      }

      .loader-track {
        width: 100%;
        height: 2px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        overflow: hidden;
      }

      .loader-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #f5a623, #ffcc66);
        border-radius: 2px;
        animation: loadBar 1.6s cubic-bezier(0.4, 0, 0.2, 1) 1s forwards;
      }

      @keyframes loadBar {
        0%   { width: 0%; }
        60%  { width: 75%; }
        90%  { width: 92%; }
        100% { width: 100%; }
      }

      .loader-label {
        font-family: 'SF Mono', 'Courier New', monospace;
        font-size: 10px;
        letter-spacing: 0.25em;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
      }

      /* Subtle scanline texture */
      .scanlines {
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.04) 2px,
          rgba(0,0,0,0.04) 4px
        );
        pointer-events: none;
      }

      /* Corner accents */
      .corner {
        position: fixed;
        width: 24px;
        height: 24px;
        opacity: 0;
        animation: fadeIn 0.4s ease 0.8s forwards;
      }
      .corner-tl { top: 24px; left: 24px; border-top: 1px solid rgba(245,166,35,0.4); border-left: 1px solid rgba(245,166,35,0.4); }
      .corner-tr { top: 24px; right: 24px; border-top: 1px solid rgba(245,166,35,0.4); border-right: 1px solid rgba(245,166,35,0.4); }
      .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(245,166,35,0.4); border-left: 1px solid rgba(245,166,35,0.4); }
      .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(245,166,35,0.4); border-right: 1px solid rgba(245,166,35,0.4); }

      /* Version tag */
      .version {
        position: fixed;
        bottom: 32px;
        font-family: 'SF Mono', 'Courier New', monospace;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: rgba(255, 255, 255, 0.18);
        opacity: 0;
        animation: fadeIn 0.4s ease 1s forwards;
      }
    </style>
  </head>
  <body>
    <div class="scanlines"></div>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="splash" id="splash">
      <img class="logo-img" src="splash-logo.png" alt="DATABEND" draggable="false" />
      <div class="loader-wrap">
        <div class="loader-track">
          <div class="loader-fill"></div>
        </div>
        <span class="loader-label">Initializing Audio Engine</span>
      </div>
    </div>

    <span class="version">v1.1.0</span>

    <script>
      // After load bar finishes, signal main process to show the main window
      setTimeout(() => {
        const splash = document.getElementById('splash');
        splash.classList.add('fade-out');
        setTimeout(() => {
          if (window.electronSplash) {
            window.electronSplash.done();
          }
        }, 500);
      }, 2800);
    </script>
  </body>
</html>
